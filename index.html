<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 ULTIMATE 2026 | WORLD CHAMPIONSHIP EDITION</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --red: #e10600;
            --black: #15151e;
            --gold: #ffd700;
        }

        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            user-select: none;
        }

        canvas {
            display: block;
        }

        #overlay {
            position: absolute;
            inset: 0;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at 50% 30%, #1c1c2e 0%, #000 70%);
            transition: opacity .8s;
        }

        .menu-title {
            font-size: 5.5rem;
            font-weight: 900;
            font-style: italic;
            margin: 0;
            text-shadow: 0 0 80px rgba(225, 6, 0, .9), 0 0 160px rgba(225, 6, 0, .3);
            letter-spacing: -3px;
        }

        .menu-title span {
            color: var(--red);
        }

        .subtitle {
            letter-spacing: 14px;
            color: #444;
            margin-bottom: 36px;
            font-size: .8rem;
        }

        .track-grid {
            display: flex;
            gap: 18px;
            margin: 32px 0;
        }

        .track-card {
            width: 220px;
            padding: 28px 20px;
            border: 2px solid #2a2a2a;
            background: linear-gradient(135deg, #15151e, #0d0d15);
            cursor: pointer;
            transition: all .4s cubic-bezier(.17, .88, .32, 1.28);
            text-align: center;
            position: relative;
            overflow: hidden;
            clip-path: polygon(0 0, 95% 0, 100% 10%, 100% 100%, 5% 100%, 0 90%);
        }

        .track-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(225, 6, 0, .05), transparent);
            opacity: 0;
            transition: .4s;
        }

        .track-card:hover {
            border-color: var(--red);
            transform: translateY(-8px);
            box-shadow: 0 16px 48px rgba(225, 6, 0, .35);
        }

        .track-card:hover::after {
            opacity: 1;
        }

        .track-card .flag {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .track-card h3 {
            margin: 0;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .track-card p {
            color: #555;
            font-size: .75rem;
            margin: 8px 0 0;
        }

        #hud {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: none;
            z-index: 1000;
        }

        .telemetry {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(0, 0, 0, .88);
            padding: 20px 28px 20px 20px;
            border-left: 5px solid var(--red);
            clip-path: polygon(0 0, 100% 0, 93% 100%, 0 100%);
            min-width: 260px;
            backdrop-filter: blur(12px);
        }

        .spd {
            font-size: 76px;
            font-weight: 900;
            line-height: .85;
            font-style: italic;
            font-variant-numeric: tabular-nums;
        }

        .spd small {
            font-size: 16px;
            color: #666;
            font-style: normal;
        }

        #rpm-bar {
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, .08);
            margin: 8px 0;
            overflow: hidden;
        }

        #rpm-fill {
            height: 100%;
            width: 0;
            border-radius: 3px;
            background: linear-gradient(90deg, #00d2be, #ffd700 60%, #e10600);
            transition: width .08s;
        }

        .lap-txt {
            font-family: 'Roboto Mono', monospace;
            font-size: 20px;
            color: var(--gold);
            margin-top: 10px;
            border-top: 1px solid #2a2a2a;
            padding-top: 10px;
        }

        #timer {
            font-family: 'Roboto Mono';
            color: #777;
            font-size: 13px;
            margin-top: 4px;
        }

        #pos-hud {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(0, 0, 0, .85);
            border-left: 5px solid var(--gold);
            padding: 10px 22px 10px 16px;
            clip-path: polygon(0 0, 100% 0, 93% 100%, 0 100%);
            backdrop-filter: blur(8px);
        }

        #pos-hud .lbl {
            font-size: 10px;
            color: #666;
            letter-spacing: 3px;
        }

        #pos-hud .num {
            font-size: 50px;
            font-weight: 900;
            font-style: italic;
            color: var(--gold);
            line-height: 1;
        }

        #pos-hud .tot {
            font-size: 16px;
            color: #999;
        }

        #mm-box {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 200px;
            height: 200px;
            background: rgba(3, 3, 10, .92);
            border: 2px solid var(--red);
            border-radius: 10px;
            backdrop-filter: blur(14px);
            box-shadow: 0 0 24px rgba(225, 6, 0, .22), inset 0 0 30px rgba(0, 0, 0, .6);
            overflow: hidden;
        }

        #mm {
            width: 100%;
            height: 100%;
        }

        #start-lights {
            position: absolute;
            top: 14%;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            background: rgba(8, 8, 8, .97);
            padding: 18px 36px;
            border: 2px solid #222;
            border-radius: 12px;
            gap: 18px;
            box-shadow: 0 0 80px rgba(0, 0, 0, .9);
        }

        .bulb {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 2px solid #333;
            transition: all .25s;
        }

        .red-on {
            background: #f00;
            box-shadow: 0 0 30px #f00, 0 0 70px rgba(255, 0, 0, .35);
            border-color: #f00;
        }

        .grn-on {
            background: #0f0;
            box-shadow: 0 0 30px #0f0, 0 0 70px rgba(0, 255, 0, .35);
            border-color: #0f0;
        }

        button {
            background: var(--red);
            color: #fff;
            border: none;
            padding: 16px 48px;
            font-family: 'Orbitron';
            font-weight: 900;
            cursor: pointer;
            transition: .25s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: .85rem;
            clip-path: polygon(4% 0, 100% 0, 96% 100%, 0 100%);
        }

        button:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 40px rgba(255, 255, 255, .4);
        }

        #end {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, .94);
            z-index: 3000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #end h2 {
            font-size: 3.5rem;
            color: var(--gold);
            text-shadow: 0 0 40px var(--gold);
            margin-bottom: 16px;
        }

        #end .ft {
            font-size: 1.8rem;
            font-family: 'Roboto Mono';
            margin-bottom: 8px;
        }

        #end .fp {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 36px;
        }

        .cfg {
            background: rgba(255, 255, 255, .04);
            padding: 22px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 18px;
            border: 1px solid rgba(255, 255, 255, .07);
        }

        .cfg label {
            font-size: .7rem;
            letter-spacing: 2px;
            color: #666;
        }

        .cfg select,
        .cfg input {
            background: #0d0d1a;
            color: #fff;
            border: 1px solid #333;
            padding: 7px 10px;
            font-family: 'Orbitron';
            font-size: .7rem;
            cursor: pointer;
            border-radius: 4px;
        }

        /* Gear indicator */
        #gear-hud {
            position: absolute;
            bottom: 30px;
            right: 280px;
            background: rgba(0, 0, 0, .85);
            padding: 12px 18px;
            border-left: 5px solid #00d2be;
            backdrop-filter: blur(8px);
        }

        #gear-hud .glbl {
            font-size: 10px;
            color: #555;
            letter-spacing: 3px;
        }

        #gear-hud .gnum {
            font-size: 52px;
            font-weight: 900;
            color: #00d2be;
            font-style: italic;
            line-height: 1;
        }

        /* DRS indicator */
        #drs-hud {
            position: absolute;
            bottom: 30px;
            right: 200px;
            background: rgba(0, 180, 80, .18);
            border: 2px solid rgba(0, 255, 100, .3);
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 11px;
            letter-spacing: 3px;
            color: rgba(0, 255, 100, .5);
            display: none;
        }

        #drs-hud.active {
            color: #0f0;
            border-color: #0f0;
            background: rgba(0, 200, 80, .3);
            box-shadow: 0 0 20px rgba(0, 255, 100, .3);
        }

        /* Speed effect overlay */
        #speed-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            opacity: 0;
            transition: opacity .15s;
        }
    </style>
</head>

<body>
    <div id="overlay">
        <h1 class="menu-title">F1 <span>ULTIMATE</span></h1>
        <p class="subtitle">PRO SIMULATOR 2026</p>
        <div class="track-grid">
            <div class="track-card" onclick="initGame('INTERLAGOS')">
                <div class="flag">🇧🇷</div>
                <h3>SAO PAULO GP</h3>
                <p>INTERLAGOS · 4.309 KM</p>
            </div>
            <div class="track-card" onclick="initGame('MONACO')">
                <div class="flag">🇲🇨</div>
                <h3>MONACO GP</h3>
                <p>MONTE CARLO · 3.337 KM</p>
            </div>
            <div class="track-card" onclick="initGame('SPA')">
                <div class="flag">🇧🇪</div>
                <h3>BELGIAN GP</h3>
                <p>SPA-FRANCORCHAMPS · 7.004 KM</p>
            </div>
        </div>
        <div class="cfg">
            <label>LIVERY:</label><input type="color" id="carColor" value="#e10600">
            <label>DIFICULDADE:</label>
            <select id="difficulty">
                <option value="rookie">ROOKIE</option>
                <option value="pro" selected>PRO</option>
                <option value="legend">LEGEND</option>
            </select>
            <label>VOLTAS:</label>
            <select id="totalLaps">
                <option value="3">3 VOLTAS</option>
                <option value="5">5 VOLTAS</option>
                <option value="10">10 VOLTAS</option>
            </select>
        </div>
    </div>

    <div id="start-lights">
        <div class="bulb" id="lb1"></div>
        <div class="bulb" id="lb2"></div>
        <div class="bulb" id="lb3"></div>
        <div class="bulb" id="lb4"></div>
        <div class="bulb" id="lb5"></div>
    </div>

    <canvas id="speedOverlayCanvas" id="speed-overlay"></canvas>

    <div id="hud">
        <div class="telemetry">
            <div class="spd"><span id="speed-txt">0</span> <small>KM/H</small></div>
            <div id="rpm-bar">
                <div id="rpm-fill"></div>
            </div>
            <div class="lap-txt" id="lap-txt">LAP 1 / 3</div>
            <div id="timer">00:00.000</div>
        </div>
        <div id="pos-hud">
            <div class="lbl">POSITION</div>
            <div><span class="num" id="pos-num">1</span><span class="tot" id="pos-tot">/4</span></div>
        </div>
        <div id="gear-hud">
            <div class="glbl">GEAR</div>
            <div class="gnum" id="gear-txt">1</div>
        </div>
        <div id="drs-hud">DRS</div>
        <div id="mm-box"><canvas id="mm"></canvas></div>
    </div>

    <div id="end">
        <h2 id="end-title">🏁 CORRIDA TERMINADA!</h2>
        <div class="ft" id="end-time"></div>
        <div class="fp" id="end-pos"></div>
        <button onclick="location.reload()">NOVA CORRIDA</button>
    </div>

    <canvas id="mainCanvas"></canvas>

    <script>
        'use strict';
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const mc = document.getElementById('mm');
        const mctx = mc.getContext('2d');

        // ── STATE ──────────────────────────────────────────────────────────────
        let player, rivals = [], trackNodes = [], raceActive = false;
        let keys = {}, startTime = 0, totalLaps = 3, diffSettings, frameCount = 0;
        let particles = [], skidMarks = [];
        const MAX_SKID = 400;

        // ── TRACKS ─────────────────────────────────────────────────────────────
        const TRACKS = {
            INTERLAGOS: [{ x: 2000, y: 2000 }, { x: 8000, y: 2000 }, { x: 9000, y: 4000 }, { x: 8500, y: 7000 }, { x: 5000, y: 9000 }, { x: 2000, y: 8000 }, { x: 1000, y: 5000 }],
            MONACO: [{ x: 1000, y: 1000 }, { x: 6000, y: 1000 }, { x: 6500, y: 4000 }, { x: 8500, y: 4500 }, { x: 8500, y: 8000 }, { x: 1000, y: 8000 }],
            SPA: [{ x: 2000, y: 2000 }, { x: 12000, y: 2000 }, { x: 13000, y: 6000 }, { x: 10000, y: 10000 }, { x: 4000, y: 12000 }, { x: 1000, y: 6000 }]
        };

        const DIFF = {
            rookie: { spd: 0.70, steer: 0.038, brkAngle: 0.60 },
            pro: { spd: 0.86, steer: 0.062, brkAngle: 0.38 },
            legend: { spd: 1.00, steer: 0.085, brkAngle: 0.20 }
        };

        const RIVAL_CFG = [
            { color: '#00d2be', name: 'MERCEDES' },
            { color: '#ff8700', name: 'MCLAREN' },
            { color: '#1565c0', name: 'RED BULL' }
        ];

        const MAX_SPD = 30, MAX_REV = -10;

        // ── PARTICLE ───────────────────────────────────────────────────────────
        function spawnParticles(x, y, color, n = 6, type = 'smoke') {
            for (let i = 0; i < n; i++) {
                let a = Math.random() * Math.PI * 2, v = Math.random() * 2 + .5;
                particles.push({
                    x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v,
                    life: 1, decay: type === 'smoke' ? 0.018 : 0.04,
                    r: type === 'smoke' ? 18 : 6,
                    color, type
                });
            }
        }

        // ── CAR CLASS ──────────────────────────────────────────────────────────
        class F1Car {
            constructor(x, y, color, isPlayer = false, idx = 0) {
                this.x = x; this.y = y; this.color = color;
                this.isPlayer = isPlayer; this.idx = idx;
                this.angle = 0; this.speed = 0; this.laps = 1;
                this.cpIdx = 0; this.tgtNode = 1;
                this.finished = false; this.finishTime = null;
                this.stuckTimer = 0; this.lastX = x; this.lastY = y;
                this.gear = 1; this.drs = false;
                this.slipping = false;
                this.engineT = 0; // heat
            }

            update() {
                if (!raceActive || this.finished) return;
                this.isPlayer ? this.updatePlayer() : this.updateAI();

                // friction
                this.speed *= 0.981;
                if (Math.abs(this.speed) < 0.01) this.speed = 0;

                let nx = this.x + Math.cos(this.angle) * this.speed;
                let ny = this.y + Math.sin(this.angle) * this.speed;

                if (!this.hitWall(nx, ny)) {
                    this.x = nx; this.y = ny;
                    // skid marks on high slip
                    if (this.slipping && Math.abs(this.speed) > 4) {
                        skidMarks.push({ x: this.x, y: this.y, a: this.angle, life: 1 });
                        if (skidMarks.length > MAX_SKID) skidMarks.shift();
                    }
                } else {
                    // wall collision — bounce & spawn sparks
                    this.speed *= -0.35;
                    spawnParticles(this.x, this.y, '#ff8800', 8, 'spark');
                }

                // gear calc (player only for display)
                if (this.isPlayer) {
                    let kmh = Math.abs(this.speed) * 16;
                    this.gear = kmh < 30 ? 1 : kmh < 70 ? 2 : kmh < 120 ? 3 : kmh < 180 ? 4 : kmh < 240 ? 5 : 6;
                    this.drs = kmh > 180;
                }

                this.checkLap();
            }

            updatePlayer() {
                let acc = (keys['w'] || keys['ArrowUp']);
                let brk = (keys['s'] || keys['ArrowDown']);
                let lft = (keys['a'] || keys['ArrowLeft']);
                let rgt = (keys['d'] || keys['ArrowRight']);

                if (acc) {
                    this.engineT = Math.min(this.engineT + 0.03, 1);
                    // overheat reduces acceleration
                    let boost = this.engineT > 0.85 ? 0.7 : 1.0;
                    this.speed += 0.58 * boost;
                    if (this.speed > MAX_SPD) this.speed = MAX_SPD;
                } else {
                    this.engineT = Math.max(this.engineT - 0.01, 0);
                }

                if (brk) {
                    if (this.speed > 0.8) {
                        this.speed *= 0.89;
                        this.slipping = true;
                        // smoke on heavy brake
                        if (Math.abs(this.speed) > 8) spawnParticles(this.x, this.y, 'rgba(120,120,120,.6)', 2, 'smoke');
                    } else {
                        this.speed -= 0.28;
                        if (this.speed < MAX_REV) this.speed = MAX_REV;
                    }
                } else {
                    this.slipping = false;
                }

                let handling = Math.min(Math.abs(this.speed) / 15, 1.2);
                let dir = this.speed >= 0 ? 1 : -1;
                if (lft) this.angle -= 0.055 * handling * dir;
                if (rgt) this.angle += 0.055 * handling * dir;

                // tyre smoke on sharp turns at speed
                if ((lft || rgt) && Math.abs(this.speed) > 12) {
                    this.slipping = true;
                    if (Math.random() < 0.3) spawnParticles(this.x, this.y, 'rgba(200,200,200,.4)', 1, 'smoke');
                }
            }

            updateAI() {
                let tgt = trackNodes[this.tgtNode];
                let nxt = trackNodes[(this.tgtNode + 1) % trackNodes.length];
                let tx = tgt.x - this.x, ty = tgt.y - this.y;
                let dist = Math.hypot(tx, ty);
                let ata = Math.atan2(ty, tx);

                let diff = ata - this.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                this.angle += diff * diffSettings.steer;

                // curve lookahead braking
                let nta = Math.atan2(nxt.y - tgt.y, nxt.x - tgt.x);
                let curve = Math.abs(nta - ata); if (curve > Math.PI) curve = Math.PI * 2 - curve;
                let topSpd = MAX_SPD * diffSettings.spd;
                if (curve > diffSettings.brkAngle && dist < 1400)
                    topSpd *= Math.max(0.45, 1 - (curve / Math.PI) * 0.65);

                if (this.speed < topSpd) this.speed += 0.44 * diffSettings.spd;
                else this.speed *= 0.975;
                this.speed = Math.min(this.speed, MAX_SPD);

                if (dist < 750) this.tgtNode = (this.tgtNode + 1) % trackNodes.length;

                // anti-stuck
                if (Math.hypot(this.x - this.lastX, this.y - this.lastY) < 0.8 && this.speed > 1) {
                    this.stuckTimer++;
                    if (this.stuckTimer > 90) { this.angle += 0.12; this.speed = 6; this.stuckTimer = 0; }
                } else this.stuckTimer = 0;
                this.lastX = this.x; this.lastY = this.y;

                // avoid other cars
                let all = [player, ...rivals.filter(r => r !== this)];
                for (let c of all) {
                    if (!c) continue;
                    let dx = this.x - c.x, dy = this.y - c.y, d = Math.hypot(dx, dy);
                    if (d < 130 && d > 0) { this.angle += (dx / d) * 0.05; this.speed *= 0.96; }
                }
            }

            hitWall(nx, ny) {
                for (let i = 0; i < trackNodes.length; i++) {
                    let p1 = trackNodes[i], p2 = trackNodes[(i + 1) % trackNodes.length];
                    if (this.seg({ x: nx, y: ny }, p1, p2) < 450) return false;
                }
                return true;
            }

            seg(p, v, w) {
                let l2 = (v.x - w.x) ** 2 + (v.y - w.y) ** 2;
                if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
                let t = Math.max(0, Math.min(1, ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2));
                return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
            }

            checkLap() {
                let f = trackNodes[0];
                if (Math.hypot(this.x - f.x, this.y - f.y) < 500 && this.cpIdx >= trackNodes.length - 2) {
                    this.laps++; this.cpIdx = 0;
                    if (this.isPlayer) {
                        document.getElementById('lap-txt').innerText = `LAP ${Math.min(this.laps, totalLaps)} / ${totalLaps}`;
                        if (this.laps > totalLaps) { this.finished = true; this.finishTime = (Date.now() - startTime) / 1000; endGame(); }
                    } else if (this.laps > totalLaps && !this.finished) {
                        this.finished = true; this.finishTime = (Date.now() - startTime) / 1000;
                    }
                }
                let ncp = trackNodes[(this.cpIdx + 1) % trackNodes.length];
                if (Math.hypot(this.x - ncp.x, this.y - ncp.y) < 950) this.cpIdx = Math.min(this.cpIdx + 1, trackNodes.length - 1);
            }

            render(c) {
                c.save();
                c.translate(this.x, this.y);
                c.rotate(this.angle);

                // ground shadow
                c.save();
                c.shadowColor = 'transparent';
                let sg = c.createRadialGradient(6, 14, 0, 6, 14, 58);
                sg.addColorStop(0, 'rgba(0,0,0,.45)');
                sg.addColorStop(1, 'rgba(0,0,0,0)');
                c.fillStyle = sg;
                c.beginPath(); c.ellipse(6, 14, 58, 20, 0, 0, Math.PI * 2); c.fill();
                c.restore();

                // rear tyres
                c.fillStyle = '#1a1a1a';
                c.beginPath(); c.roundRect(-52, -32, 28, 14, 3); c.fill();
                c.beginPath(); c.roundRect(-52, 18, 28, 14, 3); c.fill();
                // tyre detail
                c.fillStyle = '#333';
                c.fillRect(-52, -32, 5, 14); c.fillRect(-52, 18, 5, 14);

                // front tyres
                c.fillStyle = '#1a1a1a';
                c.beginPath(); c.roundRect(24, -30, 24, 13, 3); c.fill();
                c.beginPath(); c.roundRect(24, 17, 24, 13, 3); c.fill();
                c.fillStyle = '#333';
                c.fillRect(44, -30, 4, 13); c.fillRect(44, 17, 4, 13);

                // suspension arms
                c.strokeStyle = '#3a3a3a'; c.lineWidth = 3; c.beginPath();
                c.moveTo(0, 0); c.lineTo(30, -24);
                c.moveTo(0, 0); c.lineTo(30, 24);
                c.moveTo(-20, 0); c.lineTo(-40, -24);
                c.moveTo(-20, 0); c.lineTo(-40, 24);
                c.stroke();

                // car body
                c.fillStyle = this.color;
                c.beginPath();
                c.moveTo(-54, -15);
                c.quadraticCurveTo(-10, -21, 14, -18);
                c.lineTo(64, -5); c.lineTo(64, 5);
                c.lineTo(14, 18);
                c.quadraticCurveTo(-10, 21, -54, 15);
                c.closePath(); c.fill();

                // body highlight
                let hl = c.createLinearGradient(-54, -18, 0, -8);
                hl.addColorStop(0, 'rgba(255,255,255,.18)');
                hl.addColorStop(.5, 'rgba(255,255,255,.06)');
                hl.addColorStop(1, 'rgba(0,0,0,.1)');
                c.fillStyle = hl;
                c.beginPath();
                c.moveTo(-54, -15); c.quadraticCurveTo(-10, -21, 14, -18);
                c.lineTo(64, -5); c.lineTo(14, -2); c.quadraticCurveTo(-10, -6, -54, -5);
                c.closePath(); c.fill();

                // cockpit
                c.fillStyle = '#090909';
                c.beginPath(); c.ellipse(8, 0, 16, 9, 0, 0, Math.PI * 2); c.fill();
                // visor
                c.fillStyle = 'rgba(100,200,255,.25)';
                c.beginPath(); c.ellipse(7, -1, 10, 5.5, -.2, 0, Math.PI * 2); c.fill();
                // helmet
                c.fillStyle = '#fff';
                c.beginPath(); c.arc(4, 0, 5.5, 0, Math.PI * 2); c.fill();
                c.fillStyle = '#111'; c.fillRect(5, -2.5, 3, 5);

                // rear wing
                c.fillStyle = '#111'; c.fillRect(-58, -30, 12, 60);
                c.fillStyle = this.color; c.fillRect(-58, -30, 4, 60);

                // front wing
                c.fillStyle = '#111'; c.fillRect(50, -30, 8, 60);
                c.fillStyle = this.color; c.fillRect(55, -16, 7, 32);

                // DRS glow (player only)
                if (this.isPlayer && this.drs) {
                    c.fillStyle = 'rgba(0,255,100,.7)';
                    c.beginPath(); c.arc(-58, 0, 5, 0, Math.PI * 2); c.fill();
                }

                // exhaust glow
                let exg = c.createRadialGradient(-58, 0, 0, -58, 0, 16);
                exg.addColorStop(0, this.isPlayer && this.drs ? 'rgba(0,255,100,.6)' : 'rgba(255,120,0,.55)');
                exg.addColorStop(1, 'rgba(0,0,0,0)');
                c.fillStyle = exg;
                c.beginPath(); c.arc(-58, 0, 16, 0, Math.PI * 2); c.fill();

                // number plate (bots)
                if (!this.isPlayer) {
                    c.fillStyle = 'rgba(255,255,255,.85)';
                    c.beginPath(); c.roundRect(12, -9, 18, 18, 3); c.fill();
                    c.fillStyle = '#111'; c.font = 'bold 14px Orbitron';
                    c.textAlign = 'center'; c.textBaseline = 'middle';
                    c.fillText(this.idx + 1, 21, 1);
                }

                c.restore();
            }
        }

        // ── INIT ───────────────────────────────────────────────────────────────
        function initGame(tKey) {
            trackNodes = TRACKS[tKey];
            let color = document.getElementById('carColor').value;
            totalLaps = parseInt(document.getElementById('totalLaps').value);
            diffSettings = DIFF[document.getElementById('difficulty').value];

            // place player at start
            let sa = Math.atan2(trackNodes[1].y - trackNodes[0].y, trackNodes[1].x - trackNodes[0].x);
            player = new F1Car(trackNodes[0].x, trackNodes[0].y + 160, color, true);
            player.angle = sa;

            rivals = [];
            for (let i = 0; i < 3; i++) {
                let ox = Math.cos(sa + Math.PI / 2) * (i - 1) * 200;
                let oy = Math.sin(sa + Math.PI / 2) * (i - 1) * 200;
                let r = new F1Car(
                    trackNodes[0].x + ox - Math.cos(sa) * (350 + i * 200),
                    trackNodes[0].y + oy + 160 - Math.sin(sa) * (350 + i * 200),
                    RIVAL_CFG[i].color, false, i
                );
                r.angle = sa;
                rivals.push(r);
            }

            document.getElementById('lap-txt').innerText = `LAP 1 / ${totalLaps}`;
            document.getElementById('pos-tot').innerText = `/${rivals.length + 1}`;

            let ov = document.getElementById('overlay');
            ov.style.opacity = '0';
            setTimeout(() => { ov.style.display = 'none'; document.getElementById('hud').style.display = 'block'; startSeq(); }, 900);

            // prevent scrolling with arrows
            window.addEventListener('keydown', e => {
                if (['w', 'a', 's', 'd', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
                keys[e.key] = true;
            });
            window.addEventListener('keyup', e => keys[e.key] = false);

            resize();
            requestAnimationFrame(gameLoop);
        }

        function startSeq() {
            let lights = document.getElementById('start-lights');
            lights.style.display = 'flex';
            let i = 1;
            let t = setInterval(() => {
                if (i <= 5) { document.getElementById('lb' + i).classList.add('red-on'); i++; }
                else {
                    clearInterval(t);
                    setTimeout(() => {
                        document.querySelectorAll('.bulb').forEach(b => { b.classList.remove('red-on'); b.classList.add('grn-on'); });
                        raceActive = true; startTime = Date.now();
                        setTimeout(() => lights.style.display = 'none', 2000);
                    }, 700 + Math.random() * 1600);
                }
            }, 850);
        }

        // ── GAME LOOP ──────────────────────────────────────────────────────────
        function gameLoop() {
            frameCount++;
            // Background — grass with subtle noise
            ctx.fillStyle = '#1b3d1b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height * 0.62);
            ctx.rotate(-player.angle - Math.PI / 2);
            ctx.translate(-player.x, -player.y);

            renderTrack();
            renderSkidMarks();
            renderParticles(ctx);

            rivals.forEach(r => { r.update(); r.render(ctx); });
            player.update();
            player.render(ctx);

            ctx.restore();

            updateParticles();
            updateHUD();
            drawMinimap();
            renderSpeedEffect();

            requestAnimationFrame(gameLoop);
        }

        // ── TRACK ──────────────────────────────────────────────────────────────
        function renderTrack() {
            ctx.beginPath();
            ctx.moveTo(trackNodes[0].x, trackNodes[0].y);
            trackNodes.forEach(n => ctx.lineTo(n.x, n.y));
            ctx.closePath();

            // outer kerb red/white
            ctx.strokeStyle = '#cc0000'; ctx.lineWidth = 570; ctx.setLineDash([55, 55]); ctx.stroke();
            ctx.strokeStyle = '#eee'; ctx.setLineDash([55, 55]); ctx.lineDashOffset = 55; ctx.stroke();
            ctx.setLineDash([]); ctx.lineDashOffset = 0;

            // gravel/runoff
            ctx.strokeStyle = '#888866'; ctx.lineWidth = 560; ctx.stroke();

            // tarmac
            ctx.strokeStyle = '#2b2b2b'; ctx.lineWidth = 500; ctx.stroke();

            // tarmac texture lines
            ctx.strokeStyle = 'rgba(0,0,0,.18)'; ctx.lineWidth = 480; ctx.setLineDash([80, 120]); ctx.stroke();
            ctx.setLineDash([]);

            // track edge (white line)
            ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = 10; ctx.stroke();

            // center dashed line
            ctx.strokeStyle = 'rgba(255,255,255,.12)'; ctx.lineWidth = 6; ctx.setLineDash([40, 80]); ctx.stroke();
            ctx.setLineDash([]);

            // finish line
            let f = trackNodes[0], f2 = trackNodes[1];
            let fa = Math.atan2(f2.y - f.y, f2.x - f.x) + Math.PI / 2;
            ctx.save();
            ctx.translate(f.x, f.y); ctx.rotate(fa);
            for (let i = 0; i < 8; i++) {
                ctx.fillStyle = i % 2 === 0 ? '#fff' : '#000';
                ctx.fillRect(-500, i * 60 - 240, 100, 60);
            }
            // "START / FINISH" text
            ctx.fillStyle = 'rgba(255,255,255,.6)'; ctx.font = 'bold 60px Orbitron';
            ctx.textAlign = 'center'; ctx.fillText('START / FINISH', -220, -260);
            ctx.restore();

            // Trackside details per node
            trackNodes.forEach((n, i) => {
                // pit wall / billboard
                ctx.fillStyle = '#1e1e1e';
                ctx.beginPath(); ctx.roundRect(n.x + 820, n.y - 260, 360, 520, 8); ctx.fill();
                ctx.fillStyle = '#e10600'; ctx.fillRect(n.x + 820, n.y - 40, 360, 35);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Orbitron';
                ctx.fillText('F1 ULTIMATE 2026', n.x + 840, n.y - 16);
                // sponsor strip
                ctx.fillStyle = '#fff'; ctx.fillRect(n.x + 820, n.y + 50, 360, 6);

                // trees (dark circles with highlight)
                [[-900, 0], [-1150, -400], [-1100, 350], [-650, -600], [-680, 550]].forEach(([tx, ty]) => {
                    try {
                        let tg = ctx.createRadialGradient(n.x + tx - 30, n.y + ty - 30, 10, n.x + tx, n.y + ty, 160);
                        tg.addColorStop(0, '#1a4a1a'); tg.addColorStop(1, '#0a1f0a');
                        ctx.fillStyle = tg; ctx.beginPath(); ctx.arc(n.x + tx, n.y + ty, 160, 0, Math.PI * 2); ctx.fill();
                    } catch (e) { }
                });

                // tire barriers (red/white)
                for (let b = 0; b < 8; b++) {
                    ctx.fillStyle = b % 2 === 0 ? '#cc0000' : '#eee';
                    ctx.beginPath(); ctx.arc(n.x + 780, n.y - 300 + b * 80, 36, 0, Math.PI * 2); ctx.fill();
                }
            });
        }

        // ── SKID MARKS ─────────────────────────────────────────────────────────
        function renderSkidMarks() {
            for (let s of skidMarks) {
                ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.a);
                ctx.globalAlpha = s.life * 0.35;
                ctx.fillStyle = '#111';
                ctx.fillRect(-30, -5, 60, 4); ctx.fillRect(-30, 1, 60, 4);
                ctx.restore();
                s.life -= 0.0008;
            }
            skidMarks = skidMarks.filter(s => s.life > 0);
        }

        // ── PARTICLES ──────────────────────────────────────────────────────────
        function updateParticles() {
            for (let p of particles) {
                p.x += p.vx; p.y += p.vy; p.vy += 0.04;
                p.life -= p.decay;
                p.r *= 0.97;
                p.vx *= 0.96; p.vy *= 0.96;
            }
            particles = particles.filter(p => p.life > 0 && p.r > 0.5);
        }

        function renderParticles(c) {
            for (let p of particles) {
                c.save();
                c.globalAlpha = p.life * (p.type === 'smoke' ? 0.5 : 0.9);
                if (p.type === 'smoke') {
                    let g = c.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
                    g.addColorStop(0, p.color); g.addColorStop(1, 'rgba(0,0,0,0)');
                    c.fillStyle = g; c.beginPath(); c.arc(p.x, p.y, p.r, 0, Math.PI * 2); c.fill();
                } else {
                    c.fillStyle = p.color; c.shadowColor = p.color; c.shadowBlur = 6;
                    c.beginPath(); c.arc(p.x, p.y, p.r, 0, Math.PI * 2); c.fill();
                }
                c.restore();
            }
        }

        // ── SPEED EFFECT ───────────────────────────────────────────────────────
        function renderSpeedEffect() {
            let kmh = Math.abs(player.speed) * 16;
            if (kmh < 180) { return; }
            let intensity = (kmh - 180) / (MAX_SPD * 16 - 180);
            let w = canvas.width, h = canvas.height;
            // radial blur vignette at high speed
            let g = ctx.createRadialGradient(w / 2, h / 2, h * 0.2, w / 2, h / 2, h * 0.7);
            g.addColorStop(0, 'rgba(0,0,0,0)');
            g.addColorStop(1, `rgba(0,0,0,${intensity * 0.35})`);
            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0); // screen space
            ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
            // speed lines
            ctx.strokeStyle = `rgba(255,255,255,${intensity * 0.06})`;
            ctx.lineWidth = 1;
            for (let i = 0; i < 24; i++) {
                let a = (i / 24) * Math.PI * 2;
                let r1 = h * 0.28 + Math.random() * h * 0.04, r2 = r1 + h * 0.2 + Math.random() * h * 0.12;
                ctx.beginPath();
                ctx.moveTo(w / 2 + Math.cos(a) * r1, h / 2 + Math.sin(a) * r1);
                ctx.lineTo(w / 2 + Math.cos(a) * r2, h / 2 + Math.sin(a) * r2);
                ctx.stroke();
            }
            ctx.restore();
        }

        // ── HUD ────────────────────────────────────────────────────────────────
        function updateHUD() {
            let kmh = Math.abs(Math.floor(player.speed * 16));
            document.getElementById('speed-txt').innerText = kmh;
            document.getElementById('rpm-fill').style.width = Math.min(kmh / (MAX_SPD * 16), 1) * 100 + '%';
            document.getElementById('gear-txt').innerText = player.gear || 1;

            let drsEl = document.getElementById('drs-hud');
            if (player.drs) { drsEl.style.display = 'block'; drsEl.classList.add('active'); }
            else { drsEl.style.display = 'none'; drsEl.classList.remove('active'); }

            if (raceActive) {
                let t = (Date.now() - startTime) / 1000;
                let m = Math.floor(t / 60), s = (t % 60).toFixed(3).padStart(6, '0');
                document.getElementById('timer').innerText = `${String(m).padStart(2, '0')}:${s}`;
            }

            // position
            if (raceActive) {
                let all = [player, ...rivals];
                all.sort((a, b) => {
                    let ap = a.laps * 100000 + a.cpIdx * 1000;
                    let bp = b.laps * 100000 + b.cpIdx * 1000;
                    return bp - ap;
                });
                document.getElementById('pos-num').innerText = all.indexOf(player) + 1;
            }
        }

        // ── MINIMAP ────────────────────────────────────────────────────────────
        function drawMinimap() {
            let W = mc.width, H = mc.height;
            mctx.clearRect(0, 0, W, H);

            let xs = trackNodes.map(n => n.x), ys = trackNodes.map(n => n.y);
            let mnX = Math.min(...xs), mxX = Math.max(...xs);
            let mnY = Math.min(...ys), mxY = Math.max(...ys);
            let pad = 18;
            let sc = Math.min((W - pad * 2) / (mxX - mnX), (H - pad * 2) / (mxY - mnY));
            let ox = pad + (W - pad * 2 - (mxX - mnX) * sc) / 2;
            let oy = pad + (H - pad * 2 - (mxY - mnY) * sc) / 2;
            let mp = (wx, wy) => ({ x: ox + (wx - mnX) * sc, y: oy + (wy - mnY) * sc });

            // track background
            mctx.beginPath();
            let s0 = mp(trackNodes[0].x, trackNodes[0].y);
            mctx.moveTo(s0.x, s0.y);
            trackNodes.forEach(n => { let p = mp(n.x, n.y); mctx.lineTo(p.x, p.y); });
            mctx.closePath();
            // gravel outline
            mctx.strokeStyle = 'rgba(140,140,100,.25)'; mctx.lineWidth = 16; mctx.stroke();
            // kerb
            mctx.strokeStyle = 'rgba(225,6,0,.55)'; mctx.lineWidth = 10; mctx.stroke();
            // tarmac
            mctx.strokeStyle = '#404040'; mctx.lineWidth = 8; mctx.stroke();
            // center line
            mctx.strokeStyle = 'rgba(255,255,255,.15)'; mctx.lineWidth = 1.5; mctx.setLineDash([4, 6]); mctx.stroke();
            mctx.setLineDash([]);

            // finish line
            let fp = mp(trackNodes[0].x, trackNodes[0].y);
            mctx.fillStyle = '#fff'; mctx.fillRect(fp.x - 2, fp.y - 7, 4, 14);

            // rivals
            rivals.forEach(r => {
                let rp = mp(r.x, r.y);
                mctx.beginPath(); mctx.arc(rp.x, rp.y, 5, 0, Math.PI * 2);
                mctx.fillStyle = r.color; mctx.fill();
                mctx.strokeStyle = 'rgba(0,0,0,.7)'; mctx.lineWidth = 1.5; mctx.stroke();
            });

            // player
            let pp = mp(player.x, player.y);
            mctx.save(); mctx.translate(pp.x, pp.y); mctx.rotate(player.angle + Math.PI / 2);
            mctx.beginPath(); mctx.moveTo(0, -9); mctx.lineTo(-6, 6); mctx.lineTo(6, 6); mctx.closePath();
            mctx.fillStyle = player.color; mctx.fill();
            mctx.strokeStyle = '#fff'; mctx.lineWidth = 1.5; mctx.stroke();
            // pulse ring
            let pulse = 6 + Math.sin(Date.now() / 180) * 3;
            mctx.beginPath(); mctx.arc(0, 0, pulse, 0, Math.PI * 2);
            mctx.strokeStyle = player.color + '99'; mctx.lineWidth = 2; mctx.stroke();
            mctx.restore();
        }

        // ── END GAME ───────────────────────────────────────────────────────────
        function endGame() {
            raceActive = false;
            let t = player.finishTime;
            let m = Math.floor(t / 60), s = (t % 60).toFixed(3).padStart(6, '0');
            let finishedBefore = rivals.filter(r => r.finished && r.finishTime < t).length;
            let pos = finishedBefore + 1;
            document.getElementById('end-time').innerText = `TEMPO: ${String(m).padStart(2, '0')}:${s}`;
            document.getElementById('end-pos').innerText = `VOCÊ TERMINOU EM ${pos}º LUGAR DE ${rivals.length + 1}`;
            document.getElementById('end-title').innerText = pos === 1 ? '🏆 VITÓRIA!' : '🏁 CORRIDA TERMINADA!';
            let el = document.getElementById('end');
            el.style.display = 'flex';
        }

        // ── RESIZE ─────────────────────────────────────────────────────────────
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            mc.width = 200; mc.height = 200;
        }
        window.addEventListener('resize', resize);
        resize();
    </script>
