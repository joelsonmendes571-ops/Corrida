<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 ULTIMATE 2026 | 3D WORLD CHAMPIONSHIP</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --red: #e10600;
            --black: #15151e;
            --gold: #ffd700;
        }

        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            user-select: none;
        }

        #mainCanvas {
            display: block;
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        #speed-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 999;
        }

        #overlay {
            position: absolute;
            inset: 0;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at 50% 30%, #1c1c2e 0%, #000 70%);
            transition: opacity .8s;
        }

        .menu-title {
            font-size: 5.5rem;
            font-weight: 900;
            font-style: italic;
            margin: 0;
            text-shadow: 0 0 80px rgba(225, 6, 0, .9), 0 0 160px rgba(225, 6, 0, .3);
            letter-spacing: -3px;
        }

        .menu-title span {
            color: var(--red);
        }

        .subtitle {
            letter-spacing: 14px;
            color: #444;
            margin-bottom: 36px;
            font-size: .8rem;
        }

        .track-grid {
            display: flex;
            gap: 18px;
            margin: 32px 0;
        }

        .track-card {
            width: 220px;
            padding: 28px 20px;
            border: 2px solid #2a2a2a;
            background: linear-gradient(135deg, #15151e, #0d0d15);
            cursor: pointer;
            transition: all .4s cubic-bezier(.17, .88, .32, 1.28);
            text-align: center;
            position: relative;
            overflow: hidden;
            clip-path: polygon(0 0, 95% 0, 100% 10%, 100% 100%, 5% 100%, 0 90%);
        }

        .track-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(225, 6, 0, .05), transparent);
            opacity: 0;
            transition: .4s;
        }

        .track-card:hover {
            border-color: var(--red);
            transform: translateY(-8px);
            box-shadow: 0 16px 48px rgba(225, 6, 0, .35);
        }

        .track-card:hover::after {
            opacity: 1;
        }

        .track-card .flag {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .track-card h3 {
            margin: 0;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .track-card p {
            color: #555;
            font-size: .75rem;
            margin: 8px 0 0;
        }

        #hud {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: none;
            z-index: 1000;
        }

        .telemetry {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(0, 0, 0, .88);
            padding: 20px 28px 20px 20px;
            border-left: 5px solid var(--red);
            clip-path: polygon(0 0, 100% 0, 93% 100%, 0 100%);
            min-width: 260px;
            backdrop-filter: blur(12px);
        }

        .spd {
            font-size: 76px;
            font-weight: 900;
            line-height: .85;
            font-style: italic;
            font-variant-numeric: tabular-nums;
        }

        .spd small {
            font-size: 16px;
            color: #666;
            font-style: normal;
        }

        #rpm-bar {
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, .08);
            margin: 8px 0;
            overflow: hidden;
        }

        #rpm-fill {
            height: 100%;
            width: 0;
            border-radius: 3px;
            background: linear-gradient(90deg, #00d2be, #ffd700 60%, #e10600);
            transition: width .08s;
        }

        .lap-txt {
            font-family: 'Roboto Mono', monospace;
            font-size: 20px;
            color: var(--gold);
            margin-top: 10px;
            border-top: 1px solid #2a2a2a;
            padding-top: 10px;
        }

        #timer {
            font-family: 'Roboto Mono';
            color: #777;
            font-size: 13px;
            margin-top: 4px;
        }

        #pos-hud {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(0, 0, 0, .85);
            border-left: 5px solid var(--gold);
            padding: 10px 22px 10px 16px;
            clip-path: polygon(0 0, 100% 0, 93% 100%, 0 100%);
            backdrop-filter: blur(8px);
        }

        #pos-hud .lbl {
            font-size: 10px;
            color: #666;
            letter-spacing: 3px;
        }

        #pos-hud .num {
            font-size: 50px;
            font-weight: 900;
            font-style: italic;
            color: var(--gold);
            line-height: 1;
        }

        #pos-hud .tot {
            font-size: 16px;
            color: #999;
        }

        #mm-box {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 200px;
            height: 200px;
            background: rgba(3, 3, 10, .92);
            border: 2px solid var(--red);
            border-radius: 10px;
            backdrop-filter: blur(14px);
            box-shadow: 0 0 24px rgba(225, 6, 0, .22), inset 0 0 30px rgba(0, 0, 0, .6);
            overflow: hidden;
        }

        #mm {
            width: 100%;
            height: 100%;
        }

        #start-lights {
            position: absolute;
            top: 14%;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            background: rgba(8, 8, 8, .97);
            padding: 18px 36px;
            border: 2px solid #222;
            border-radius: 12px;
            gap: 18px;
            box-shadow: 0 0 80px rgba(0, 0, 0, .9);
            z-index: 1500;
        }

        .bulb {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 2px solid #333;
            transition: all .25s;
        }

        .red-on {
            background: #f00;
            box-shadow: 0 0 30px #f00, 0 0 70px rgba(255, 0, 0, .35);
            border-color: #f00;
        }

        .grn-on {
            background: #0f0;
            box-shadow: 0 0 30px #0f0, 0 0 70px rgba(0, 255, 0, .35);
            border-color: #0f0;
        }

        button {
            background: var(--red);
            color: #fff;
            border: none;
            padding: 16px 48px;
            font-family: 'Orbitron';
            font-weight: 900;
            cursor: pointer;
            transition: .25s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: .85rem;
            clip-path: polygon(4% 0, 100% 0, 96% 100%, 0 100%);
        }

        button:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 40px rgba(255, 255, 255, .4);
        }

        #end {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, .94);
            z-index: 3000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #end h2 {
            font-size: 3.5rem;
            color: var(--gold);
            text-shadow: 0 0 40px var(--gold);
            margin-bottom: 16px;
        }

        #end .ft {
            font-size: 1.8rem;
            font-family: 'Roboto Mono';
            margin-bottom: 8px;
        }

        #end .fp {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 36px;
        }

        .cfg {
            background: rgba(255, 255, 255, .04);
            padding: 22px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 18px;
            border: 1px solid rgba(255, 255, 255, .07);
        }

        .cfg label {
            font-size: .7rem;
            letter-spacing: 2px;
            color: #666;
        }

        .cfg select,
        .cfg input {
            background: #0d0d1a;
            color: #fff;
            border: 1px solid #333;
            padding: 7px 10px;
            font-family: 'Orbitron';
            font-size: .7rem;
            cursor: pointer;
            border-radius: 4px;
        }

        /* Gear indicator */
        #gear-hud {
            position: absolute;
            bottom: 30px;
            right: 280px;
            background: rgba(0, 0, 0, .85);
            padding: 12px 18px;
            border-left: 5px solid #00d2be;
            backdrop-filter: blur(8px);
        }

        #gear-hud .glbl {
            font-size: 10px;
            color: #555;
            letter-spacing: 3px;
        }

        #gear-hud .gnum {
            font-size: 52px;
            font-weight: 900;
            color: #00d2be;
            font-style: italic;
            line-height: 1;
        }

        /* DRS indicator */
        #drs-hud {
            position: absolute;
            bottom: 30px;
            right: 200px;
            background: rgba(0, 180, 80, .18);
            border: 2px solid rgba(0, 255, 100, .3);
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 11px;
            letter-spacing: 3px;
            color: rgba(0, 255, 100, .5);
            display: none;
        }

        #drs-hud.active {
            color: #0f0;
            border-color: #0f0;
            background: rgba(0, 200, 80, .3);
            box-shadow: 0 0 20px rgba(0, 255, 100, .3);
        }
    </style>
</head>

<body>
    <div id="overlay">
        <h1 class="menu-title">F1 <span>ULTIMATE 3D</span></h1>
        <p class="subtitle">MAXIMUM REALISM 2026</p>
        <div class="track-grid">
            <div class="track-card" onclick="initGame('INTERLAGOS')">
                <div class="flag">🇧🇷</div>
                <h3>SAO PAULO GP</h3>
                <p>INTERLAGOS · 4.309 KM</p>
            </div>
            <div class="track-card" onclick="initGame('MONACO')">
                <div class="flag">🇲🇨</div>
                <h3>MONACO GP</h3>
                <p>MONTE CARLO · 3.337 KM</p>
            </div>
            <div class="track-card" onclick="initGame('SPA')">
                <div class="flag">🇧🇪</div>
                <h3>BELGIAN GP</h3>
                <p>SPA-FRANCORCHAMPS · 7.004 KM</p>
            </div>
        </div>
        <div class="cfg">
            <label>LIVERY:</label><input type="color" id="carColor" value="#e10600">
            <label>ESTILO:</label>
            <select id="carStyle">
                <option value="modern" selected>MODERNO</option>
                <option value="aero">AERO</option>
                <option value="classic">CLÁSSICO</option>
            </select>
            <label>DIFICULDADE:</label>
            <select id="difficulty">
                <option value="rookie">ROOKIE</option>
                <option value="pro" selected>PRO</option>
                <option value="legend">LEGEND</option>
            </select>
            <label>VOLTAS:</label>
            <select id="totalLaps">
                <option value="3">3 VOLTAS</option>
                <option value="5">5 VOLTAS</option>
                <option value="10">10 VOLTAS</option>
            </select>
        </div>
    </div>

    <div id="start-lights">
        <div class="bulb" id="lb1"></div>
        <div class="bulb" id="lb2"></div>
        <div class="bulb" id="lb3"></div>
        <div class="bulb" id="lb4"></div>
        <div class="bulb" id="lb5"></div>
    </div>

    <!-- 3D Canvas -->
    <canvas id="mainCanvas"></canvas>

    <!-- 2D Canvas Overlays for Speed Effect -->
    <canvas id="speed-overlay"></canvas>

    <div id="hud">
        <div class="telemetry">
            <div class="spd"><span id="speed-txt">0</span> <small>KM/H</small></div>
            <div id="rpm-bar">
                <div id="rpm-fill"></div>
            </div>
            <div class="lap-txt" id="lap-txt">LAP 1 / 3</div>
            <div id="timer">00:00.000</div>
        </div>
        <div id="pos-hud">
            <div class="lbl">POSITION</div>
            <div><span class="num" id="pos-num">1</span><span class="tot" id="pos-tot">/4</span></div>
        </div>
        <div id="gear-hud">
            <div class="glbl">GEAR</div>
            <div class="gnum" id="gear-txt">1</div>
        </div>
        <div id="drs-hud">DRS</div>
        <div id="mm-box"><canvas id="mm"></canvas></div>
    </div>

    <div id="end">
        <h2 id="end-title">🏁 CORRIDA TERMINADA!</h2>
        <div class="ft" id="end-time"></div>
        <div class="fp" id="end-pos"></div>
        <button onclick="location.reload()">NOVA CORRIDA</button>
    </div>

    <script>
        'use strict';

        // Overlays & Minimap config
        const speedCanvas = document.getElementById('speed-overlay');
        const speedCtx = speedCanvas.getContext('2d');
        const mc = document.getElementById('mm');
        const mctx = mc.getContext('2d');

        // ── THREE.JS GLOBALS ──────────────────────────────────────────────────────────
        let scene, camera, renderer, ambientLight, dirLight;
        let trackMesh, kerbMesh;
        let trackCurve;

        // ── STATE ──────────────────────────────────────────────────────────────
        let player, rivals = [], trackNodes = [], raceActive = false;
        let keys = {}, startTime = 0, totalLaps = 3, diffSettings, frameCount = 0;
        let particles = [];

        // ── MORE DIFFICULT TRACKS ──────────────────────────────────────────────
        // Tracks are made more technical, harder
        const TRACKS = {
            INTERLAGOS: [
                { x: 1000, y: 3000 }, { x: 4000, y: 1500 }, { x: 7000, y: 2500 }, { x: 8000, y: 1500 }, { x: 10000, y: 2000 },
                { x: 11000, y: 5000 }, { x: 9500, y: 8000 }, { x: 6000, y: 11000 }, { x: 3000, y: 9000 }, { x: 2000, y: 8000 }, { x: 500, y: 5000 }
            ],
            MONACO: [
                { x: 1000, y: 1000 }, { x: 3000, y: 500 }, { x: 5500, y: 1800 }, { x: 7000, y: 3000 }, { x: 8000, y: 2000 },
                { x: 9000, y: 4000 }, { x: 7500, y: 7000 }, { x: 4000, y: 8000 }, { x: 1500, y: 7000 }, { x: 500, y: 4000 }
            ],
            SPA: [
                { x: 2000, y: 2000 }, { x: 5000, y: 3000 }, { x: 8000, y: 1000 }, { x: 12000, y: 3500 }, { x: 14000, y: 7000 },
                { x: 12000, y: 11000 }, { x: 8000, y: 15000 }, { x: 4000, y: 12000 }, { x: 1000, y: 8000 }
            ]
        };

        const DIFF = {
            rookie: { spd: 0.60, steer: 0.038, brkAngle: 0.60 },
            pro: { spd: 0.75, steer: 0.062, brkAngle: 0.38 },
            legend: { spd: 0.88, steer: 0.085, brkAngle: 0.20 }
        };

        const RIVAL_CFG = [
            { color: 0x00d2be, name: 'MERCEDES', style: 'aero' },
            { color: 0xff8700, name: 'MCLAREN', style: 'modern' },
            { color: 0x1565c0, name: 'RED BULL', style: 'aero' },
            { color: 0x005aff, name: 'ALPINE', style: 'classic' },
            { color: 0x229977, name: 'ASTON MARTIN', style: 'modern' },
            { color: 0xffffff, name: 'HAAS', style: 'classic' },
            { color: 0x44aaee, name: 'WILLIAMS', style: 'aero' }
        ];

        const MAX_SPD = 30, MAX_REV = -8;

        // ── 3D INIT ────────────────────────────────────────────────────────────
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa0c4ff);
            scene.fog = new THREE.Fog(0xa0c4ff, 2000, 15000);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 10, 20000);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('mainCanvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            ambientLight = new THREE.AmbientLight(0xffffff, 0.45);
            scene.add(ambientLight);

            dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(2000, 3000, 2000);
            dirLight.castShadow = true;
            dirLight.shadow.camera.left = -6000;
            dirLight.shadow.camera.right = 6000;
            dirLight.shadow.camera.top = 6000;
            dirLight.shadow.camera.bottom = -6000;
            dirLight.shadow.camera.far = 15000;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            let grPlane = new THREE.Mesh(
                new THREE.PlaneGeometry(80000, 80000),
                new THREE.MeshStandardMaterial({ color: 0x225522, roughness: 1, metalness: 0 })
            );
            grPlane.rotation.x = -Math.PI / 2;
            grPlane.position.y = -1;
            grPlane.receiveShadow = true;
            scene.add(grPlane);
        }

        // ── CAR CLASS ──────────────────────────────────────────────────────────
        class F1Car {
            constructor(x, y, colorCode, isPlayer = false, idx = 0, style = "modern") {
                this.x = x; this.y = y;
                this.color = colorCode;
                this.style = style;
                this.isPlayer = isPlayer; this.idx = idx;
                this.angle = 0; this.speed = 0; this.laps = 1;
                this.cpIdx = 0; this.tgtNode = 1;
                this.finished = false; this.finishTime = null;
                this.stuckTimer = 0; this.lastX = x; this.lastY = y;
                this.gear = 1; this.drs = false;
                this.slipping = false;
                this.engineT = 0;

                this.mesh = this.createMesh();
                scene.add(this.mesh);
            }

            createMesh() {
                let grp = new THREE.Group();
                grp.castShadow = true; grp.receiveShadow = true;

                let primaryMat = new THREE.MeshStandardMaterial({ color: this.color, roughness: 0.3, metalness: 0.6 });
                let blackMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
                let wheelMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9, metalness: 0.1 });

                // Chassis logic
                let chas;
                if (this.style === 'classic') {
                    chas = new THREE.Mesh(new THREE.BoxGeometry(105, 18, 35), primaryMat);
                } else if (this.style === 'aero') {
                    chas = new THREE.Mesh(new THREE.CylinderGeometry(18, 22, 115, 8), primaryMat);
                    chas.rotation.z = Math.PI / 2;
                } else {
                    chas = new THREE.Mesh(new THREE.BoxGeometry(110, 20, 40), primaryMat);
                }
                chas.position.y = 15; chas.castShadow = true; chas.receiveShadow = true;
                grp.add(chas);

                // Nose cone
                let noseGeo = new THREE.CylinderGeometry(5, 16, 40, 8);
                noseGeo.rotateZ(Math.PI / 2);
                let nose = new THREE.Mesh(noseGeo, primaryMat);
                nose.position.set(65, 12, 0); nose.castShadow = true;
                grp.add(nose);

                // Cockpit
                let cock = new THREE.Mesh(new THREE.BoxGeometry(25, 15, 18), blackMat);
                cock.position.set(-5, 28, 0);
                grp.add(cock);

                // Driver Helmet (matching color)
                let helmetGeo = new THREE.SphereGeometry(6, 16, 16);
                let helmetMat = new THREE.MeshStandardMaterial({ color: this.color, roughness: 0.2, metalness: 0.5 });
                let helmet = new THREE.Mesh(helmetGeo, helmetMat);
                helmet.position.set(-5, 36, 0);
                grp.add(helmet);

                // Halo
                let haloGeo = new THREE.TorusGeometry(8, 1, 8, 16, Math.PI);
                let halo = new THREE.Mesh(haloGeo, blackMat);
                halo.rotation.y = Math.PI / 2;
                halo.position.set(-5, 38, 0);
                grp.add(halo);

                // Wheels and Rims
                let wG = new THREE.CylinderGeometry(15, 15, 12, 16);
                wG.rotateX(Math.PI / 2);
                let hwG = new THREE.CylinderGeometry(8, 8, 12.5, 16);
                hwG.rotateX(Math.PI / 2);
                let hwmat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.8 });

                [[-35, 15, -28], [-35, 15, 28], [40, 15, -28], [40, 15, 28]].forEach(p => {
                    let w = new THREE.Mesh(wG, wheelMat);
                    w.position.set(...p); w.castShadow = true;
                    let hw = new THREE.Mesh(hwG, hwmat);
                    w.add(hw);
                    grp.add(w);
                });

                // Detailed Front Wing
                let fw = new THREE.Mesh(new THREE.BoxGeometry(16, 4, 65), blackMat);
                fw.position.set(70, 7, 0); fw.castShadow = true;
                grp.add(fw);
                let fwe1 = new THREE.Mesh(new THREE.BoxGeometry(20, 10, 3), primaryMat);
                fwe1.position.set(70, 10, 32); grp.add(fwe1);
                let fwe2 = new THREE.Mesh(new THREE.BoxGeometry(20, 10, 3), primaryMat);
                fwe2.position.set(70, 10, -32); grp.add(fwe2);

                // Detailed Rear Wing
                let rwMain = new THREE.Mesh(new THREE.BoxGeometry(10, 20, 55), primaryMat);
                rwMain.position.set(-45, 30, 0); rwMain.castShadow = true;
                grp.add(rwMain);
                let rwTop = new THREE.Mesh(new THREE.BoxGeometry(14, 2, 55), blackMat);
                rwTop.position.set(-45, 40, 0);
                grp.add(rwTop);
                let rwSide1 = new THREE.Mesh(new THREE.BoxGeometry(20, 25, 2), primaryMat);
                rwSide1.position.set(-45, 30, 28); grp.add(rwSide1);
                let rwSide2 = new THREE.Mesh(new THREE.BoxGeometry(20, 25, 2), primaryMat);
                rwSide2.position.set(-45, 30, -28); grp.add(rwSide2);

                return grp;
            }

            update() {
                if (!raceActive || this.finished) return;
                this.isPlayer ? this.updatePlayer() : this.updateAI();

                // Realistic dynamic friction
                this.speed *= 0.985;
                if (Math.abs(this.speed) < 0.01) this.speed = 0;

                let nx = this.x + Math.cos(this.angle) * this.speed;
                let ny = this.y + Math.sin(this.angle) * this.speed; // Z-axis

                if (!this.hitWall(nx, ny)) {
                    this.x = nx; this.y = ny;
                    // Spark / smoke particles on high slip
                    if (this.slipping && Math.abs(this.speed) > 6 && Math.random() < 0.3) {
                        spawn3DParticle(this.x, 10, this.y, 0x555555, 0.05);
                    }
                } else {
                    this.speed *= -0.3;
                    for (let i = 0; i < 3; i++) spawn3DParticle(this.x, 15, this.y, 0xffa500, 0.1);
                }

                if (this.isPlayer) {
                    let kmh = Math.abs(this.speed) * 16;
                    this.gear = kmh < 30 ? 1 : kmh < 70 ? 2 : kmh < 130 ? 3 : kmh < 190 ? 4 : kmh < 260 ? 5 : 6;
                    this.drs = kmh > 180;
                }

                this.checkLap();
                this.handleCarCollision();
            }

            handleCarCollision() {
                let all = [player, ...rivals];
                for (let c of all) {
                    if (c === this || !c) continue;
                    let dx = this.x - c.x, dy = this.y - c.y;
                    let dist = Math.hypot(dx, dy);
                    if (dist < 100 && dist > 0) {
                        let overlap = 100 - dist;
                        this.x += (dx / dist) * overlap / 2;
                        this.y += (dy / dist) * overlap / 2;
                        c.x -= (dx / dist) * overlap / 2;
                        c.y -= (dy / dist) * overlap / 2;

                        // Physics bounce and speed penalty
                        let avg = (this.speed + c.speed) * 0.5;
                        this.speed = avg * 0.8;
                        c.speed = avg * 0.8;
                    }
                }
            }

            updatePlayer() {
                let acc = (keys['w'] || keys['ArrowUp'] || keys['W']);
                let brk = (keys['s'] || keys['ArrowDown'] || keys['S']);
                let lft = (keys['a'] || keys['ArrowLeft'] || keys['A']);
                let rgt = (keys['d'] || keys['ArrowRight'] || keys['D']);

                if (acc) {
                    this.engineT = Math.min(this.engineT + 0.03, 1);
                    this.speed += 0.55;
                    if (this.speed > MAX_SPD) this.speed = MAX_SPD;
                } else {
                    this.engineT = Math.max(this.engineT - 0.01, 0);
                }

                if (brk) {
                    if (this.speed > 1) {
                        this.speed -= 0.65; // realistic braking
                        this.slipping = true;
                        if (this.speed > 8) spawn3DParticle(this.x, 5, this.y, 0xaaaaaa, 0.05);
                    } else {
                        this.speed -= 0.3;
                        if (this.speed < MAX_REV) this.speed = MAX_REV;
                    }
                } else {
                    this.slipping = false;
                }

                let handling = Math.min(Math.abs(this.speed) / 12, 1.0);
                let dir = this.speed >= 0 ? 1 : -1;
                if (lft) this.angle -= 0.045 * handling * dir;
                if (rgt) this.angle += 0.045 * handling * dir;
            }

            updateAI() {
                let tgt = trackNodes[this.tgtNode];
                let nxt = trackNodes[(this.tgtNode + 1) % trackNodes.length];
                let tx = tgt.x - this.x, ty = tgt.y - this.y;
                let dist = Math.hypot(tx, ty);
                let ata = Math.atan2(ty, tx);

                let diff = ata - this.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                this.angle += diff * diffSettings.steer;

                let nta = Math.atan2(nxt.y - tgt.y, nxt.x - tgt.x);
                let curve = Math.abs(nta - ata); if (curve > Math.PI) curve = Math.PI * 2 - curve;

                // Mesma velocidade base, mas limite 100km/h menor que o player (100 / 16)
                let aiMaxSpd = MAX_SPD - (100 / 16);
                let topSpd = aiMaxSpd;

                if (curve > diffSettings.brkAngle && dist < 1200)
                    topSpd *= Math.max(0.40, 1 - (curve / Math.PI) * 0.7);

                if (this.speed < topSpd) this.speed += 0.45;
                else this.speed *= 0.97;
                this.speed = Math.min(this.speed, aiMaxSpd);

                if (dist < 300) this.tgtNode = (this.tgtNode + 1) % trackNodes.length;

                // Sistema anti-travamento melhorado
                if (Math.hypot(this.x - this.lastX, this.y - this.lastY) < 1.0) {
                    this.stuckTimer++;
                    if (this.stuckTimer > 50) {
                        this.angle = Math.atan2(tgt.y - this.y, tgt.x - this.x);
                        this.speed = 10;
                        this.x += Math.cos(this.angle) * 40;
                        this.y += Math.sin(this.angle) * 40;
                        this.stuckTimer = 0;
                    }
                } else this.stuckTimer = 0;

                this.lastX = this.x; this.lastY = this.y;
            }

            hitWall(nx, ny) {
                // Since trackNodes is highly dense, segment test is fast and robust
                for (let i = 0; i < trackNodes.length; i += 3) { // optimization step
                    let p1 = trackNodes[i], p2 = trackNodes[(i + 3) % trackNodes.length];
                    if (!p2) p2 = trackNodes[0];
                    if (this.seg({ x: nx, y: ny }, p1, p2) < 400) return false;
                }
                return true;
            }

            seg(p, v, w) {
                let l2 = (v.x - w.x) ** 2 + (v.y - w.y) ** 2;
                if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
                let t = Math.max(0, Math.min(1, ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2));
                return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
            }

            checkLap() {
                let f = trackNodes[0];
                if (Math.hypot(this.x - f.x, this.y - f.y) < 600 && this.cpIdx >= trackNodes.length - 20) {
                    this.laps++; this.cpIdx = 0;
                    if (this.isPlayer) {
                        document.getElementById('lap-txt').innerText = `LAP ${Math.min(this.laps, totalLaps)} / ${totalLaps}`;
                        if (this.laps > totalLaps) { this.finished = true; this.finishTime = (Date.now() - startTime) / 1000; endGame(); }
                    } else if (this.laps > totalLaps && !this.finished) {
                        this.finished = true; this.finishTime = (Date.now() - startTime) / 1000;
                    }
                }
                let ncp = trackNodes[(this.cpIdx + 1) % trackNodes.length];
                if (Math.hypot(this.x - ncp.x, this.y - ncp.y) < 600) this.cpIdx = Math.min(this.cpIdx + 1, trackNodes.length - 1);
            }
        }

        // ── 3D PARTICLES ───────────────────────────────────────────────────────
        function spawn3DParticle(x, y, z, color, decay = 0.03) {
            let geo = new THREE.DodecahedronGeometry(5 + Math.random() * 5, 0);
            let mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.7 });
            let m = new THREE.Mesh(geo, mat);
            m.position.set(x, y, z);
            scene.add(m);
            particles.push({ mesh: m, life: 1.0, scale: 1, decay: decay });
        }

        function update3DParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.life -= p.decay;
                p.scale += 0.05;
                p.mesh.scale.set(p.scale, p.scale, p.scale);
                p.mesh.material.opacity = p.life * 0.5;
                p.mesh.position.y += 2;
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }
        }

        // ── TRACK GENERATION ───────────────────────────────────────────────────
        function createTrackMeshes(curve) {
            let pts = curve.getPoints(500);

            let tGeo = new THREE.BufferGeometry();
            let kGeo = new THREE.BufferGeometry();

            let tVerts = [], kVerts = [], cVerts = [];
            let tw = 400; // track width
            let kw = 480; // kerb width edge

            for (let i = 0; i < pts.length; i++) {
                let p0 = pts[i];
                let pNext = pts[(i + 1) % pts.length];

                let dir = new THREE.Vector3().subVectors(pNext, p0).normalize();
                let norm = new THREE.Vector3(-dir.z, 0, dir.x).normalize();

                let pNext2 = pts[(i + 2) % pts.length];
                let dir2 = new THREE.Vector3().subVectors(pNext2, pNext).normalize();
                let norm2 = new THREE.Vector3(-dir2.z, 0, dir2.x).normalize();

                let vl = p0.clone().add(norm.clone().multiplyScalar(tw));
                let vr = p0.clone().sub(norm.clone().multiplyScalar(tw));
                let vln = pNext.clone().add(norm2.clone().multiplyScalar(tw));
                let vrn = pNext.clone().sub(norm2.clone().multiplyScalar(tw));

                tVerts.push(vl.x, 2, vl.z, vr.x, 2, vr.z, vln.x, 2, vln.z);
                tVerts.push(vr.x, 2, vr.z, vrn.x, 2, vrn.z, vln.x, 2, vln.z);

                // kerbs
                let kl = p0.clone().add(norm.clone().multiplyScalar(kw));
                let kr = p0.clone().sub(norm.clone().multiplyScalar(kw));
                let kln = pNext.clone().add(norm2.clone().multiplyScalar(kw));
                let krn = pNext.clone().sub(norm2.clone().multiplyScalar(kw));

                kVerts.push(kl.x, 1, kl.z, vl.x, 1, vl.z, kln.x, 1, kln.z);
                kVerts.push(vl.x, 1, vl.z, vln.x, 1, vln.z, kln.x, 1, kln.z);

                kVerts.push(vr.x, 1, vr.z, kr.x, 1, kr.z, vrn.x, 1, vrn.z);
                kVerts.push(kr.x, 1, kr.z, krn.x, 1, krn.z, vrn.x, 1, vrn.z);

                // Alternating red/white colors
                let rColor = (Math.floor(i / 8) % 2 === 0) ? [0.8, 0, 0] : [0.9, 0.9, 0.9];
                for (let v = 0; v < 12; v++) cVerts.push(...rColor);
            }

            tGeo.setAttribute('position', new THREE.Float32BufferAttribute(tVerts, 3));
            tGeo.computeVertexNormals();
            let tMesh = new THREE.Mesh(tGeo, new THREE.MeshStandardMaterial({ color: 0x2b2b2b, roughness: 0.9, side: THREE.DoubleSide }));
            tMesh.receiveShadow = true;
            scene.add(tMesh);

            kGeo.setAttribute('position', new THREE.Float32BufferAttribute(kVerts, 3));
            kGeo.setAttribute('color', new THREE.Float32BufferAttribute(cVerts, 3));
            kGeo.computeVertexNormals();
            let kMesh = new THREE.Mesh(kGeo, new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.7, side: THREE.DoubleSide }));
            kMesh.receiveShadow = true;
            scene.add(kMesh);
        }

        // ── TREE GENERATION (FORA DA PISTA) ────────────────────────────────────
        function createTrees(pts) {
            let trees = new THREE.Group();
            let trunkG = new THREE.CylinderGeometry(15, 25, 120, 6);
            let leafG = new THREE.DodecahedronGeometry(80, 1);
            let trunkM = new THREE.MeshStandardMaterial({ color: 0x4a2e15, roughness: 1.0 });
            let leafM = new THREE.MeshStandardMaterial({ color: 0x1f661f, roughness: 0.9 });

            for (let i = 0; i < 600; i++) {
                let x = (Math.random() - 0.5) * 20000 + 5000;
                let z = (Math.random() - 0.5) * 20000 + 5000;

                let tooClose = false;
                for (let p of pts) {
                    if (Math.hypot(p.x - x, p.z - z) < 800) { tooClose = true; break; }
                }
                if (!tooClose) {
                    let tr = new THREE.Mesh(trunkG, trunkM);
                    tr.position.set(x, 60, z);
                    tr.castShadow = true; tr.receiveShadow = true;

                    let lf = new THREE.Mesh(leafG, leafM);
                    lf.position.set(x, 140 + Math.random() * 40, z);
                    lf.castShadow = true; lf.receiveShadow = true;
                    lf.rotation.y = Math.random() * Math.PI;

                    let s = 0.6 + Math.random() * 0.8;
                    tr.scale.set(s, s, s); lf.scale.set(s, s, s);
                    trees.add(tr); trees.add(lf);
                }
            }
            scene.add(trees);
        }

        // ── GRANDSTANDS (ARQUIBANCADA) ─────────────────────────────────────────
        function createGrandstands(pts) {
            let stands = new THREE.Group();
            let baseGeo = new THREE.BoxGeometry(500, 150, 150);
            let baseMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 });
            let roofGeo = new THREE.BoxGeometry(550, 20, 200);
            let roofMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, roughness: 0.5 });

            let crowdGeo = new THREE.BoxGeometry(5, 5, 5);

            for (let i = 0; i < 15; i++) {
                let idx = Math.floor(Math.random() * pts.length);
                let p = pts[idx];
                let nextP = pts[(idx + 1) % pts.length];
                let dx = nextP.x - p.x;
                let dz = nextP.z - p.z;
                let angle = Math.atan2(dz, dx);
                let normX = -Math.sin(angle);
                let normZ = Math.cos(angle);

                let dist = 800 + Math.random() * 400;
                let dir = (Math.random() > 0.5) ? 1 : -1;
                let x = p.x + normX * dist * dir;
                let z = p.z + normZ * dist * dir;

                let stand = new THREE.Group();
                stand.position.set(x, 75, z);
                stand.rotation.y = -angle + (dir === 1 ? Math.PI : 0);

                let base = new THREE.Mesh(baseGeo, baseMat);
                base.castShadow = true; base.receiveShadow = true;
                stand.add(base);

                let roof = new THREE.Mesh(roofGeo, roofMat);
                roof.position.set(0, 120, -20);
                roof.rotation.x = -0.1;
                roof.castShadow = true;
                stand.add(roof);

                for (let c = 0; c < 200; c++) {
                    let cCube = new THREE.Mesh(crowdGeo, new THREE.MeshBasicMaterial({
                        color: new THREE.Color().setHSL(Math.random(), 0.8, 0.5)
                    }));
                    cCube.position.set((Math.random() - 0.5) * 480, 80 + Math.random() * 20, (Math.random() - 0.5) * 130);
                    stand.add(cCube);
                }

                stands.add(stand);
            }
            scene.add(stands);
        }

        // ── INIT ───────────────────────────────────────────────────────────────
        function initGame(tKey) {
            if (!scene) init3D();
            else {
                // Clear old resources safely
                while (scene.children.length > 0) {
                    scene.remove(scene.children[0]);
                }
                init3D(); // setup lights and ground again
            }

            let color = document.getElementById('carColor').value;
            totalLaps = parseInt(document.getElementById('totalLaps').value);
            diffSettings = DIFF[document.getElementById('difficulty').value];

            let rawPts = TRACKS[tKey].map(n => new THREE.Vector3(n.x, 0, n.y));
            trackCurve = new THREE.CatmullRomCurve3(rawPts, true, 'catmullrom', 0.5);
            let cPts = trackCurve.getSpacedPoints(200);

            // Assign dense mapped smooth points to trackNodes
            trackNodes = cPts.map(p => ({ x: p.x, y: p.z }));

            createTrackMeshes(trackCurve);
            createTrees(cPts);
            createGrandstands(cPts);

            // Place player
            let node0 = trackNodes[0];
            let node1 = trackNodes[1];
            let sa = Math.atan2(node1.y - node0.y, node1.x - node0.x);
            let style = document.getElementById('carStyle').value;
            player = new F1Car(node0.x, node0.y, color, true, 0, style);
            player.angle = sa;

            rivals = [];
            for (let i = 0; i < 7; i++) {
                let gridPos = i + 1;
                let ox = Math.cos(sa + Math.PI / 2) * (gridPos % 2 === 0 ? -220 : 220);
                let oy = Math.sin(sa + Math.PI / 2) * (gridPos % 2 === 0 ? -220 : 220);
                let offsetBack = 400 + Math.floor(gridPos / 2) * 550;
                let ccolor = (typeof RIVAL_CFG[i].color === 'string') ? parseInt(RIVAL_CFG[i].color.replace('#', '0x')) : RIVAL_CFG[i].color;

                let r = new F1Car(
                    node0.x + ox - Math.cos(sa) * offsetBack,
                    node0.y + oy - Math.sin(sa) * offsetBack,
                    ccolor, false, i + 1, RIVAL_CFG[i].style
                );
                r.angle = sa;
                rivals.push(r);
            }

            document.getElementById('lap-txt').innerText = `LAP 1 / ${totalLaps}`;
            document.getElementById('pos-tot').innerText = `/${rivals.length + 1}`;

            let ov = document.getElementById('overlay');
            ov.style.opacity = '0';
            setTimeout(() => { ov.style.display = 'none'; document.getElementById('hud').style.display = 'block'; startSeq(); }, 900);

            window.addEventListener('keydown', e => {
                const k = e.key.toLowerCase();
                if (['w', 'a', 's', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright'].includes(k)) e.preventDefault();
                keys[k] = true;
                keys[e.key] = true; // Fallback for case sensitivity
            });
            window.addEventListener('keyup', e => {
                keys[e.key.toLowerCase()] = false;
                keys[e.key] = false;
            });

            resize();
            requestAnimationFrame(gameLoop);
        }

        function startSeq() {
            let lights = document.getElementById('start-lights');
            lights.style.display = 'flex';
            let i = 1;
            let t = setInterval(() => {
                if (i <= 5) { document.getElementById('lb' + i).classList.add('red-on'); i++; }
                else {
                    clearInterval(t);
                    setTimeout(() => {
                        document.querySelectorAll('.bulb').forEach(b => { b.classList.remove('red-on'); b.classList.add('grn-on'); });
                        raceActive = true; startTime = Date.now();
                        setTimeout(() => lights.style.display = 'none', 2000);
                    }, 500 + Math.random() * 1000);
                }
            }, 850);
        }

        // ── GAME LOOP ──────────────────────────────────────────────────────────
        function gameLoop() {
            frameCount++;

            if (raceActive) {
                rivals.forEach(r => r.update());
                player.update();
            }

            update3DParticles();

            // Sync meshes and Third-person camera
            rivals.forEach(r => {
                r.mesh.position.set(r.x, 15, r.y);
                r.mesh.rotation.y = -r.angle;
            });
            if (player && player.mesh) {
                player.mesh.position.set(player.x, 15, player.y);
                player.mesh.rotation.y = -player.angle;

                let camDist = 550;
                let camHeight = 220;
                let cx = player.x - Math.cos(player.angle) * camDist;
                let cz = player.y - Math.sin(player.angle) * camDist;

                camera.position.lerp(new THREE.Vector3(cx, player.mesh.position.y + camHeight, cz), 0.15);
                camera.lookAt(player.x, player.mesh.position.y + 20, player.y);
            }

            renderer.render(scene, camera);

            updateHUD();
            drawMinimap();
            renderSpeedEffect();

            requestAnimationFrame(gameLoop);
        }

        // ── 2D OVERLAYS ────────────────────────────────────────────────────────
        function renderSpeedEffect() {
            let w = speedCanvas.width, h = speedCanvas.height;
            speedCtx.clearRect(0, 0, w, h);
            if (!player) return;
            let kmh = Math.abs(player.speed) * 16;
            if (kmh < 180) return;
            let intensity = (kmh - 180) / (MAX_SPD * 16 - 180);

            let g = speedCtx.createRadialGradient(w / 2, h / 2, h * 0.2, w / 2, h / 2, h * 0.7);
            g.addColorStop(0, 'rgba(0,0,0,0)');
            g.addColorStop(1, `rgba(0,0,0,${intensity * 0.35})`);

            speedCtx.fillStyle = g;
            speedCtx.fillRect(0, 0, w, h);

            speedCtx.strokeStyle = `rgba(255,255,255,${intensity * 0.08})`;
            speedCtx.lineWidth = 1;
            for (let i = 0; i < 35; i++) {
                let a = (i / 35) * Math.PI * 2 + (Math.random() * 0.02);
                let r1 = h * 0.28 + Math.random() * h * 0.05;
                let r2 = r1 + h * 0.2 + Math.random() * h * 0.12;
                speedCtx.beginPath();
                speedCtx.moveTo(w / 2 + Math.cos(a) * r1, h / 2 + Math.sin(a) * r1);
                speedCtx.lineTo(w / 2 + Math.cos(a) * r2, h / 2 + Math.sin(a) * r2);
                speedCtx.stroke();
            }
        }

        function updateHUD() {
            let kmh = Math.abs(Math.floor(player.speed * 16));
            document.getElementById('speed-txt').innerText = kmh;
            document.getElementById('rpm-fill').style.width = Math.min(kmh / (MAX_SPD * 16), 1) * 100 + '%';
            document.getElementById('gear-txt').innerText = player.gear || 1;

            let drsEl = document.getElementById('drs-hud');
            if (player.drs) { drsEl.style.display = 'block'; drsEl.classList.add('active'); }
            else { drsEl.style.display = 'none'; drsEl.classList.remove('active'); }

            if (raceActive) {
                let t = (Date.now() - startTime) / 1000;
                let m = Math.floor(t / 60), s = (t % 60).toFixed(3).padStart(6, '0');
                document.getElementById('timer').innerText = `${String(m).padStart(2, '0')}:${s}`;
            }

            if (raceActive) {
                let all = [player, ...rivals];
                all.sort((a, b) => {
                    let ap = a.laps * 100000 + a.cpIdx * 1000;
                    let bp = b.laps * 100000 + b.cpIdx * 1000;
                    return bp - ap;
                });
                document.getElementById('pos-num').innerText = all.indexOf(player) + 1;
            }
        }

        function drawMinimap() {
            let W = mc.width, H = mc.height;
            mctx.clearRect(0, 0, W, H);

            let xs = trackNodes.map(n => n.x), ys = trackNodes.map(n => n.y);
            let mnX = Math.min(...xs), mxX = Math.max(...xs);
            let mnY = Math.min(...ys), mxY = Math.max(...ys);
            let pad = 18;
            let sc = Math.min((W - pad * 2) / (mxX - mnX), (H - pad * 2) / (mxY - mnY));
            let ox = pad + (W - pad * 2 - (mxX - mnX) * sc) / 2;
            let oy = pad + (H - pad * 2 - (mxY - mnY) * sc) / 2;
            let mp = (wx, wy) => ({ x: ox + (wx - mnX) * sc, y: oy + (wy - mnY) * sc });

            mctx.beginPath();
            let s0 = mp(trackNodes[0].x, trackNodes[0].y);
            mctx.moveTo(s0.x, s0.y);
            trackNodes.forEach(n => { let p = mp(n.x, n.y); mctx.lineTo(p.x, p.y); });
            mctx.closePath();

            mctx.strokeStyle = 'rgba(140,140,100,.15)'; mctx.lineWidth = 14; mctx.stroke();
            mctx.strokeStyle = 'rgba(225,6,0,.4)'; mctx.lineWidth = 8; mctx.stroke();
            mctx.strokeStyle = '#404040'; mctx.lineWidth = 5; mctx.stroke();

            let fp = mp(trackNodes[0].x, trackNodes[0].y);
            mctx.fillStyle = '#fff'; mctx.fillRect(fp.x - 2, fp.y - 7, 4, 14);

            rivals.forEach(r => {
                let rp = mp(r.x, r.y);
                mctx.beginPath(); mctx.arc(rp.x, rp.y, 4, 0, Math.PI * 2);
                mctx.fillStyle = '#' + r.color.toString(16).padStart(6, '0'); mctx.fill();
            });

            let pp = mp(player.x, player.y);
            mctx.save(); mctx.translate(pp.x, pp.y); mctx.rotate(player.angle + Math.PI / 2);
            mctx.beginPath(); mctx.moveTo(0, -8); mctx.lineTo(-5, 5); mctx.lineTo(5, 5); mctx.closePath();
            mctx.fillStyle = player.color; mctx.fill();
            let pulse = 5 + Math.sin(Date.now() / 180) * 2;
            mctx.beginPath(); mctx.arc(0, 0, pulse, 0, Math.PI * 2);
            mctx.strokeStyle = player.color + '99'; mctx.lineWidth = 2; mctx.stroke();
            mctx.restore();
        }

        // ── END GAME ───────────────────────────────────────────────────────────
        function endGame() {
            raceActive = false;
            let t = player.finishTime;
            let m = Math.floor(t / 60), s = (t % 60).toFixed(3).padStart(6, '0');
            let finishedBefore = rivals.filter(r => r.finished && r.finishTime < t).length;
            let pos = finishedBefore + 1;
            document.getElementById('end-time').innerText = `TEMPO: ${String(m).padStart(2, '0')}:${s}`;
            document.getElementById('end-pos').innerText = `VOCÊ TERMINOU EM ${pos}º LUGAR DE ${rivals.length + 1}`;
            document.getElementById('end-title').innerText = pos === 1 ? '🏆 VITÓRIA!' : '🏁 CORRIDA TERMINADA!';
            let el = document.getElementById('end');
            el.style.display = 'flex';
        }

        // ── RESIZE ─────────────────────────────────────────────────────────────
        function resize() {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
            speedCanvas.width = window.innerWidth;
            speedCanvas.height = window.innerHeight;
            mc.width = 200; mc.height = 200;
        }
        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
